version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rca
      POSTGRES_PASSWORD: rca
      POSTGRES_DB: rca_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rca -d rca_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  rca:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://rca:rca@db:5432/rca_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/logs:ro          # mount your log files here
      - ./samples:/samples:ro    # sample logs included
      - ./output:/output         # reports written here

volumes:
  pgdata:
